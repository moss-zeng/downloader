<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>媒体下载器</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0e0f13;
    --bg-card: #16171d;
    --bg-card-hover: #1e1f28;
    --bg-input: #1a1b23;
    --border: #2a2b36;
    --border-focus: #4a6cf7;
    --text: #e2e4ea;
    --text-dim: #7a7d8b;
    --text-muted: #50525e;
    --accent: #4a6cf7;
    --accent-hover: #5b7bf8;
    --green: #34d399;
    --green-dim: rgba(52,211,153,0.12);
    --red: #f87171;
    --orange: #fb923c;
    --tag-video: #3b82f6;
    --tag-video-bg: rgba(59,130,246,0.12);
    --tag-image: #a78bfa;
    --tag-image-bg: rgba(167,139,250,0.12);
    --radius: 10px;
    --shadow: 0 2px 20px rgba(0,0,0,0.3);
  }

  body {
    font-family: 'Noto Sans SC', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* ---- Header ---- */
  .header {
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    background: rgba(14,15,19,0.85);
    backdrop-filter: blur(16px);
    z-index: 100;
  }
  .header h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .header .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }
  .platform-badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 500;
    display: none;
  }
  .platform-badge.douyin {
    background: rgba(254,44,85,0.15);
    color: #fe2c55;
    border: 1px solid rgba(254,44,85,0.3);
    display: inline-block;
  }
  .platform-badge.tiktok {
    background: rgba(254,44,85,0.15);
    color: #fe2c55;
    border: 1px solid rgba(254,44,85,0.3);
    display: inline-block;
  }
  .platform-badge.instagram {
    background: rgba(225,48,108,0.15);
    color: #e1306c;
    border: 1px solid rgba(225,48,108,0.3);
    display: inline-block;
  }

  /* ---- Input Area ---- */
  .input-area {
    max-width: 720px;
    margin: 40px auto 32px;
    padding: 0 24px;
  }
  .input-group {
    display: flex;
    gap: 10px;
  }
  .input-group input {
    flex: 1;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-group input:focus {
    border-color: var(--border-focus);
  }
  .input-group input::placeholder {
    color: var(--text-muted);
  }
  .btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 12px 24px;
    font-size: 14px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.2s, opacity 0.2s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--accent-hover); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
  }
  .btn-outline:hover {
    border-color: var(--text-dim);
    color: var(--text);
    background: transparent;
  }
  .btn-green {
    background: var(--green);
    color: #000;
    font-weight: 700;
  }
  .btn-green:hover { background: #3ee6a8; }

  .cookie-section {
    margin-top: 14px;
  }
  .cookie-label {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .cookie-hint {
    color: var(--text-muted);
    font-size: 11px;
  }
  .cookie-section textarea {
    width: 100%;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    color: var(--text);
    font-size: 12px;
    font-family: 'Consolas', 'Courier New', monospace;
    outline: none;
    resize: vertical;
    min-height: 56px;
    max-height: 160px;
    line-height: 1.5;
  }
  .cookie-section textarea:focus { border-color: var(--border-focus); }
  .cookie-ok {
    color: var(--green);
    font-size: 11px;
    margin-top: 4px;
    display: none;
  }
  .cookie-ok.show { display: block; }

  /* ---- Status ---- */
  .status-bar {
    max-width: 720px;
    margin: 0 auto 24px;
    padding: 0 24px;
    font-size: 13px;
    color: var(--text-dim);
    min-height: 20px;
  }
  .status-bar .loading::after {
    content: '';
    display: inline-block;
    width: 12px; height: 12px;
    border: 2px solid var(--text-muted);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-left: 8px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---- Toolbar ---- */
  .toolbar {
    max-width: 1280px;
    margin: 0 auto 16px;
    padding: 0 24px;
    display: none;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .toolbar.show { display: flex; }
  .toolbar-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .toolbar-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .filter-btn {
    padding: 6px 14px;
    font-size: 12px;
    border-radius: 6px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    color: var(--text-dim);
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--text-dim); color: var(--text); }
  .filter-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(74,108,247,0.08);
  }
  .select-count {
    font-size: 13px;
    color: var(--text-dim);
  }
  .select-count span { color: var(--accent); font-weight: 700; }

  /* ---- Grid ---- */
  .grid {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 24px 60px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
  }

  /* ---- Card ---- */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.15s, background 0.15s;
    position: relative;
  }
  .card:hover {
    border-color: var(--text-muted);
    background: var(--bg-card-hover);
    transform: translateY(-2px);
  }
  .card.selected {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent);
  }

  .card-thumb {
    width: 100%;
    aspect-ratio: 3/4;
    object-fit: cover;
    display: block;
    background: var(--bg-input);
  }
  .card-thumb-placeholder {
    width: 100%;
    aspect-ratio: 3/4;
    background: var(--bg-input);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    font-size: 13px;
  }

  .card-check {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 24px;
    height: 24px;
    border-radius: 6px;
    border: 2px solid rgba(255,255,255,0.35);
    background: rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .card.selected .card-check {
    background: var(--accent);
    border-color: var(--accent);
  }
  .card.selected .card-check::after {
    content: '✓';
    color: #fff;
    font-size: 14px;
    font-weight: 700;
  }

  .card-tag {
    position: absolute;
    top: 10px;
    left: 10px;
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
    backdrop-filter: blur(8px);
  }
  .card-tag.video {
    background: var(--tag-video-bg);
    color: var(--tag-video);
    border: 1px solid rgba(59,130,246,0.25);
  }
  .card-tag.image {
    background: var(--tag-image-bg);
    color: var(--tag-image);
    border: 1px solid rgba(167,139,250,0.25);
  }

  .card-info {
    padding: 12px;
  }
  .card-desc {
    font-size: 13px;
    color: var(--text);
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    word-break: break-all;
    min-height: 36px;
  }
  .card-time {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 6px;
  }

  /* ---- Download Bar ---- */
  .download-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(14,15,19,0.92);
    backdrop-filter: blur(16px);
    border-top: 1px solid var(--border);
    padding: 14px 32px;
    display: none;
    align-items: center;
    justify-content: space-between;
    z-index: 100;
  }
  .download-bar.show { display: flex; }
  .download-info {
    font-size: 13px;
    color: var(--text-dim);
  }
  .download-info span { color: var(--text); font-weight: 500; }

  /* ---- Progress Overlay ---- */
  .progress-overlay {
    position: fixed;
    bottom: 60px;
    right: 24px;
    width: 320px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    display: none;
    z-index: 101;
    box-shadow: var(--shadow);
  }
  .progress-overlay.show { display: block; }
  .progress-title {
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 12px;
  }
  .progress-bar-outer {
    width: 100%;
    height: 6px;
    background: var(--bg-input);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 10px;
  }
  .progress-bar-inner {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.3s;
    width: 0%;
  }
  .progress-text {
    font-size: 12px;
    color: var(--text-dim);
  }
  .progress-done {
    color: var(--green);
    font-weight: 500;
  }

  /* ---- Empty State ---- */
  .empty-state {
    text-align: center;
    padding: 80px 24px;
    color: var(--text-muted);
    font-size: 14px;
  }

  /* ---- Path Config ---- */
  .path-row {
    margin-top: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text-muted);
  }
  .path-row label { white-space: nowrap; }
  .path-row input {
    flex: 1;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    color: var(--text-dim);
    font-size: 12px;
    font-family: 'Consolas', 'Courier New', monospace;
    outline: none;
  }
</style>
</head>
<body>

<div class="header">
  <div class="dot"></div>
  <h1>媒体下载器</h1>
  <span class="platform-badge" id="platformBadge"></span>
</div>

<div class="input-area">
  <div class="input-group">
    <input type="text" id="linkInput" placeholder="粘贴用户主页链接（支持抖音 / TikTok / Instagram）">
    <button class="btn" id="fetchBtn" onclick="fetchPosts()">获取列表</button>
  </div>
  <div class="cookie-section">
    <div class="cookie-label">
      Cookie <span class="cookie-hint">— 从 Cookies Editor 导出（支持JSON数组或Header字符串格式）</span>
    </div>
    <textarea id="cookieInput" placeholder='粘贴对应平台的Cookie（Tiktok平台不需要）'></textarea>
    <div class="cookie-ok" id="cookieOk">✓ Cookie已识别</div>
  </div>
  <div class="path-row" style="margin-top:10px;">
    <label>起始日期：</label>
    <input type="date" id="startDate">
    <label style="margin-left:12px;">结束日期：</label>
    <input type="date" id="endDate">
  </div>
  <div class="path-row">
    <label>保存路径：</label>
    <input type="text" id="savePath" value="" placeholder="默认保存到桌面">
  </div>
</div>

<div class="status-bar" id="statusBar"></div>

<div class="toolbar" id="toolbar">
  <div class="toolbar-left">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">全部</button>
    <button class="filter-btn" data-filter="video" onclick="setFilter('video')">视频</button>
    <button class="filter-btn" data-filter="image" onclick="setFilter('image')">图集</button>
    <span style="color:var(--border); margin: 0 4px;">│</span>
    <button class="btn-outline btn" style="padding:6px 12px; font-size:12px;" onclick="selectAll()">全选</button>
    <button class="btn-outline btn" style="padding:6px 12px; font-size:12px;" onclick="deselectAll()">取消全选</button>
  </div>
  <div class="toolbar-right">
    <span class="select-count">已选 <span id="selectCount">0</span> / <span id="totalCount">0</span></span>
  </div>
</div>

<div class="grid" id="grid"></div>

<div class="empty-state" id="emptyState">输入用户主页链接，获取作品列表</div>

<div class="download-bar" id="downloadBar">
  <div class="download-info">
    已选择 <span id="barCount">0</span> 个作品
    （视频 <span id="barVideo">0</span> · 图集 <span id="barImage">0</span>）
  </div>
  <button class="btn btn-green" onclick="startDownload()">开始下载</button>
</div>

<div class="progress-overlay" id="progressPanel">
  <div class="progress-title" id="progressTitle">下载中...</div>
  <div class="progress-bar-outer">
    <div class="progress-bar-inner" id="progressBar"></div>
  </div>
  <div class="progress-text" id="progressText">准备中...</div>
</div>

<script>
  // ============ State ============
  let allItems = [];
  let nickname = '';
  let secUid = '';
  let currentPlatform = '';
  let currentFilter = 'all';
  let selectedIds = new Set();
  let pollTimer = null;

  // ============ Platform Badge ============
  function setPlatformBadge(platform) {
    const badge = document.getElementById('platformBadge');
    badge.className = 'platform-badge';
    if (platform === 'douyin') {
      badge.textContent = '抖音';
      badge.classList.add('douyin');
    } else if (platform === 'tiktok') {
      badge.textContent = 'TikTok';
      badge.classList.add('tiktok');
    } else if (platform === 'instagram') {
      badge.textContent = 'Instagram';
      badge.classList.add('instagram');
    }
  }

  // ============ Fetch ============
  async function fetchPosts() {
    const link = document.getElementById('linkInput').value.trim();
    if (!link) return;

    const btn = document.getElementById('fetchBtn');
    btn.disabled = true;
    btn.textContent = '获取中...';
    setStatus('正在解析链接并获取作品列表，请稍候...', true);
    hideToolbar();
    document.getElementById('grid').innerHTML = '';
    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('platformBadge').className = 'platform-badge';
    selectedIds.clear();
    updateBar();

    try {
      const cookie = document.getElementById('cookieInput').value.trim();
      const resp = await fetch('/api/fetch', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          link, cookie,
          start_date: document.getElementById('startDate').value,
          end_date: document.getElementById('endDate').value
        })
      });
      const data = await resp.json();

      if (!data.ok) {
        setStatus('❌ ' + data.msg);
        document.getElementById('emptyState').style.display = 'block';
        btn.disabled = false;
        btn.textContent = '获取列表';
        return;
      }

      // 轮询获取进度
      let fetchPollFails = 0;
      const fetchPoll = setInterval(async () => {
        try {
          const statusResp = await fetch('/api/fetch_status');
          const st = await statusResp.json();
          fetchPollFails = 0;

          if (st.platform) setPlatformBadge(st.platform);

          setStatus(`正在获取作品列表... 已找到 ${st.filtered_count} 个作品（共扫描 ${st.total_fetched} 个）`, true);

          if (st.finished) {
            clearInterval(fetchPoll);

            if (st.error) {
              setStatus('❌ ' + st.error);
              document.getElementById('emptyState').style.display = 'block';
              btn.disabled = false;
              btn.textContent = '获取列表';
            } else {
              setStatus('正在加载作品列表...', true);
              const resultResp = await fetch('/api/fetch_result');
              const result = await resultResp.json();

              allItems = result.items;
              nickname = result.nickname;
              secUid = result.sec_uid;
              currentPlatform = result.platform || '';

              setStatus(`✅ 获取到 ${allItems.length} 个作品（用户：${nickname}）`);
              showToolbar(allItems.length);
              renderGrid();
              btn.disabled = false;
              btn.textContent = '获取列表';
            }
          }
        } catch (e) {
          fetchPollFails++;
          if (fetchPollFails >= 5) {
            clearInterval(fetchPoll);
            setStatus('❌ 与服务器的连接已断开');
            btn.disabled = false;
            btn.textContent = '获取列表';
          }
        }
      }, 1000);

    } catch (e) {
      setStatus('❌ 网络请求失败: ' + e.message);
      btn.disabled = false;
      btn.textContent = '获取列表';
    }
  }

  // ============ Render ============
  let filteredItems = [];
  let renderIndex = 0;
  const BATCH_SIZE = 40;
  let renderingBatch = false;

  function renderGrid() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    renderIndex = 0;

    filteredItems = currentFilter === 'all'
      ? allItems
      : allItems.filter(i => i.type === currentFilter);

    if (filteredItems.length === 0) {
      document.getElementById('emptyState').style.display = 'block';
      document.getElementById('emptyState').textContent = '当前筛选条件下没有作品';
      return;
    }

    document.getElementById('emptyState').style.display = 'none';
    renderBatch();
  }

  function renderBatch() {
    if (renderIndex >= filteredItems.length) return;

    const grid = document.getElementById('grid');
    const end = Math.min(renderIndex + BATCH_SIZE, filteredItems.length);
    const fragment = document.createDocumentFragment();

    for (let i = renderIndex; i < end; i++) {
      const item = filteredItems[i];
      const card = document.createElement('div');
      card.className = 'card' + (selectedIds.has(item.aweme_id) ? ' selected' : '');
      card.dataset.id = item.aweme_id;
      card.onclick = () => toggleSelect(item.aweme_id);

      card.innerHTML = `
        <div class="card-check"></div>
        <span class="card-tag ${item.type}">${item.type === 'video' ? '视频' : '图集'}</span>
        ${item.cover_url
          ? `<img class="card-thumb" src="${item.cover_url}" loading="lazy" onerror="this.outerHTML='<div class=card-thumb-placeholder>加载失败</div>'">`
          : '<div class="card-thumb-placeholder">无封面</div>'}
        <div class="card-info">
          <div class="card-desc">${escHtml(item.desc || '无描述')}</div>
          <div class="card-time">${item.create_time || ''}</div>
        </div>
      `;
      fragment.appendChild(card);
    }

    grid.appendChild(fragment);
    renderIndex = end;
  }

  // ============ Selection ============
  function toggleSelect(id) {
    if (selectedIds.has(id)) {
      selectedIds.delete(id);
    } else {
      selectedIds.add(id);
    }
    const card = document.querySelector(`.card[data-id="${id}"]`);
    if (card) card.classList.toggle('selected');
    updateBar();
  }

  function selectAll() {
    const filtered = currentFilter === 'all'
      ? allItems
      : allItems.filter(i => i.type === currentFilter);
    filtered.forEach(i => selectedIds.add(i.aweme_id));
    renderGrid();
    updateBar();
  }

  function deselectAll() {
    selectedIds.clear();
    renderGrid();
    updateBar();
  }

  function updateBar() {
    const count = selectedIds.size;
    const vCount = allItems.filter(i => selectedIds.has(i.aweme_id) && i.type === 'video').length;
    const iCount = allItems.filter(i => selectedIds.has(i.aweme_id) && i.type === 'image').length;

    document.getElementById('selectCount').textContent = count;
    document.getElementById('barCount').textContent = count;
    document.getElementById('barVideo').textContent = vCount;
    document.getElementById('barImage').textContent = iCount;

    const bar = document.getElementById('downloadBar');
    bar.classList.toggle('show', count > 0);
  }

  // ============ Filter ============
  function setFilter(type) {
    currentFilter = type;
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.filter === type);
    });
    renderGrid();
  }

  // ============ Download ============
  async function startDownload() {
    if (selectedIds.size === 0) return;

    const savePath = document.getElementById('savePath').value.trim();

    try {
      const resp = await fetch('/api/download', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          ids: Array.from(selectedIds),
          nickname: nickname,
          save_path: savePath
        })
      });
      const data = await resp.json();
      if (!data.ok) {
        alert(data.msg);
        return;
      }

      showProgress();
      pollDownloadStatus();

    } catch (e) {
      alert('下载请求失败: ' + e.message);
    }
  }

  function showProgress() {
    document.getElementById('progressPanel').classList.add('show');
    document.getElementById('progressBar').style.width = '0%';
    document.getElementById('progressText').textContent = '准备中...';
    document.getElementById('progressTitle').textContent = '下载中...';
    document.getElementById('progressTitle').className = 'progress-title';
  }

  function pollDownloadStatus() {
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(async () => {
      try {
        const resp = await fetch('/api/download_status');
        const st = await resp.json();

        const pct = st.total > 0 ? Math.round((st.done / st.total) * 100) : 0;
        document.getElementById('progressBar').style.width = pct + '%';

        if (st.running) {
          document.getElementById('progressText').textContent =
            `${st.done}/${st.total} 完成` + (st.failed > 0 ? ` · ${st.failed} 失败` : '')
            + (st.current ? ` · ${st.current}` : '');
        }

        if (st.finished) {
          clearInterval(pollTimer);
          pollTimer = null;
          document.getElementById('progressBar').style.width = '100%';
          document.getElementById('progressBar').style.background = 'var(--green)';
          document.getElementById('progressTitle').textContent = '下载完成';
          document.getElementById('progressTitle').classList.add('progress-done');
          document.getElementById('progressText').textContent =
            `共 ${st.done} 个成功` + (st.failed > 0 ? `，${st.failed} 个失败` : '');

          setTimeout(() => {
            document.getElementById('progressPanel').classList.remove('show');
            document.getElementById('progressBar').style.background = 'var(--accent)';
          }, 5000);
        }
      } catch (e) {
        // 静默忽略
      }
    }, 800);
  }

  // ============ Helpers ============
  function setStatus(text, loading = false) {
    const el = document.getElementById('statusBar');
    el.innerHTML = loading ? `<span class="loading">${text}</span>` : text;
  }

  function showToolbar(total) {
    document.getElementById('toolbar').classList.add('show');
    document.getElementById('totalCount').textContent = total;
  }

  function hideToolbar() {
    document.getElementById('toolbar').classList.remove('show');
  }

  function escHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // Enter键触发获取
  document.getElementById('linkInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') fetchPosts();
  });

  // Cookie粘贴提示
  document.getElementById('cookieInput').addEventListener('input', () => {
    const val = document.getElementById('cookieInput').value.trim();
    const ok = document.getElementById('cookieOk');
    ok.classList.toggle('show', val.length > 10);
  });

  // 滚动到底部时加载更多
  window.addEventListener('scroll', () => {
    if (renderIndex >= filteredItems.length) return;
    if (renderingBatch) return;

    const scrollBottom = window.innerHeight + window.scrollY;
    const docHeight = document.documentElement.scrollHeight;

    if (docHeight - scrollBottom < 600) {
      renderingBatch = true;
      requestAnimationFrame(() => {
        renderBatch();
        renderingBatch = false;
      });
    }
  });
</script>

</body>
</html>
